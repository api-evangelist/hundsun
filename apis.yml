aid: hundsun
name: Hundsun Technologies
description: >-
  Hundsun Technologies Inc. is a leading Chinese fintech company providing
  software solutions and services for financial institutions including
  securities, funds, futures, banking, asset management, and wealth
  management. Hundsun's products are typically delivered as enterprise
  software with bespoke customer integrations rather than as a public
  developer API platform.
